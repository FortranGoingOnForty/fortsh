# Bracketed Paste Tests for fortsh
# Instant-render paste, multi-line buffer (AR-10), and ANSI-injection sanitization.

metadata:
  category: "Paste"
  description: "Bracketed paste: full-line insert, newline handling, control-byte sanitization"
  phase: 7

tests:
  # =============================================================
  # BASIC PASTE — whole command lands, then executes on Enter
  # =============================================================
  - name: "Pasted command runs"
    steps:
      - send_paste: "echo pasted_hello"
      - send_key: "Enter"
    expect_output: "pasted_hello"
    match_type: "contains"

  - name: "Paste then edit then run"
    steps:
      - send_paste: "echo paste_edit"
      - send: "_tail"
      - send_key: "Enter"
    expect_output: "paste_edit_tail"
    match_type: "contains"

  # =============================================================
  # MULTI-LINE PASTE (AR-10) — newlines are preserved as a real multi-line
  # buffer; Enter runs the lines as separate, sequential commands. (A pasted
  # newline is buffer content, not the Enter key, so it never auto-executes.)
  # Discriminator: the assignment on line 1 must take effect for line 2, which
  # only happens if they run as two commands — collapsed, ${ZZ} would expand
  # empty in the current shell and "hello-world" would never appear. The
  # marker is not contiguous in the pasted text, so it can't match the echo.
  # =============================================================
  - name: "Multi-line paste runs lines as separate commands"
    steps:
      - send_paste: "ZZ=hello\necho ${ZZ}-world"
      - send_key: "Enter"
    expect_output: "hello-world"
    match_type: "contains"

  # =============================================================
  # SANITIZATION — embedded escape sequences are neutralized.
  # If ESC[2J leaked through it would clear the screen and the
  # raw bytes would corrupt the buffer; sanitized, it just runs.
  # =============================================================
  - name: "Embedded ANSI escape is stripped from paste"
    steps:
      - send_paste: "echo TAG\x1b[2JEND"
      - send_key: "Enter"
    expect_output: "TAGEND"
    match_type: "contains"

  - name: "Embedded BEL/control bytes dropped from paste"
    steps:
      - send_paste: "echo CTL\x07\x01OK"
      - send_key: "Enter"
    expect_output: "CTLOK"
    match_type: "contains"
