name: Test Suite

on:
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]

jobs:
  # ============================================================================
  # x86_64 Linux (gfortran)
  # ============================================================================
  posix-tests:
    name: POSIX Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Build fortsh
        run: make release
      - name: Run POSIX tests
        run: ./tests/run_all_tests.sh --posix-only

  builtin-tests:
    name: Builtin Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Build fortsh
        run: make release
      - name: Run builtin tests
        run: ./tests/builtins/run_builtin_tests.sh --verbose

  stress-tests:
    name: Stress Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Build fortsh
        run: make release
      - name: Run stress tests
        run: ./tests/builtins/test_stress.sh
        timeout-minutes: 10

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Build fortsh
        run: make release
      - name: Run integration tests
        run: ./tests/builtins/integration/run_integration_tests.sh --verbose

  interactive-tests:
    name: Interactive PTY Tests
    if: "!contains(github.event.head_commit.message, '[skip-pty]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build fortsh
        run: make release
      - name: Install Python dependencies
        run: |
          cd tests/interactive
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
      - name: Run interactive tests
        run: |
          cd tests/interactive
          source .venv/bin/activate
          python run_tests.py

  # ============================================================================
  # ARM64 Linux (gfortran)
  # ============================================================================
  arm64-linux-interactive:
    name: "ARM64 Linux: Interactive PTY Tests"
    if: "!contains(github.event.head_commit.message, '[skip-pty]')"
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build fortsh
        run: make release
      - name: Install Python dependencies
        run: |
          cd tests/interactive
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
      - name: Run interactive tests
        run: |
          cd tests/interactive
          source .venv/bin/activate
          python run_tests.py

  arm64-linux-posix:
    name: "ARM64 Linux: POSIX Tests"
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Build fortsh
        run: make release
      - name: Run POSIX tests
        run: ./tests/run_all_tests.sh --posix-only

  arm64-linux-builtins:
    name: "ARM64 Linux: Builtin Tests"
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Build fortsh
        run: make release
      - name: Run builtin tests
        run: ./tests/builtins/run_builtin_tests.sh --verbose

  arm64-linux-stress:
    name: "ARM64 Linux: Stress Tests"
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Build fortsh
        run: make release
      - name: Run stress tests
        run: ./tests/builtins/test_stress.sh
        timeout-minutes: 10

  arm64-linux-integration:
    name: "ARM64 Linux: Integration Tests"
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Build fortsh
        run: make release
      - name: Run integration tests
        run: ./tests/builtins/integration/run_integration_tests.sh --verbose

  # ============================================================================
  # macOS Apple Silicon (flang-new)
  # ============================================================================
  macos-arm64-posix:
    name: "macOS ARM64: POSIX Tests"
    runs-on: macos-15
    env:
      FC: flang-new
      BASH_REF: /opt/homebrew/bin/bash
    steps:
      - uses: actions/checkout@v4
      - name: Install flang-new and coreutils
        run: brew install flang coreutils bash
      - name: Build fortsh
        run: make release
      - name: Run POSIX tests
        run: ./tests/run_all_tests.sh --posix-only

  macos-arm64-builtins:
    name: "macOS ARM64: Builtin Tests"
    runs-on: macos-15
    env:
      FC: flang-new
      BASH_REF: /opt/homebrew/bin/bash
    steps:
      - uses: actions/checkout@v4
      - name: Install flang-new and coreutils
        run: brew install flang coreutils bash
      - name: Build fortsh
        run: make release
      - name: Run builtin tests
        run: ./tests/builtins/run_builtin_tests.sh --verbose

  macos-arm64-stress:
    name: "macOS ARM64: Stress Tests"
    runs-on: macos-15
    env:
      FC: flang-new
      BASH_REF: /opt/homebrew/bin/bash
    steps:
      - uses: actions/checkout@v4
      - name: Install flang-new and coreutils
        run: brew install flang coreutils bash
      - name: Build fortsh
        run: make release
      - name: Run stress tests
        run: ./tests/builtins/test_stress.sh
        timeout-minutes: 15

  macos-arm64-interactive:
    name: "macOS ARM64: Interactive PTY Tests"
    if: "!contains(github.event.head_commit.message, '[skip-pty]')"
    runs-on: macos-15
    env:
      FC: flang-new
      BASH_REF: /opt/homebrew/bin/bash
    steps:
      - uses: actions/checkout@v4
      - name: Install flang-new and coreutils
        run: brew install flang coreutils bash
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build fortsh
        run: make release
      - name: Install Python dependencies
        run: |
          cd tests/interactive
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
      - name: Run interactive tests
        run: |
          cd tests/interactive
          source .venv/bin/activate
          python run_tests.py

  macos-arm64-integration:
    name: "macOS ARM64: Integration Tests"
    runs-on: macos-15
    env:
      FC: flang-new
      BASH_REF: /opt/homebrew/bin/bash
    steps:
      - uses: actions/checkout@v4
      - name: Install flang-new and coreutils
        run: brew install flang coreutils bash
      - name: Build fortsh
        run: make release
      - name: Run integration tests
        run: ./tests/builtins/integration/run_integration_tests.sh --verbose
